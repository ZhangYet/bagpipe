baseURL: /
title: 一派胡言

# Use local theme (run ./scripts/setup-theme.sh once to clone into themes/hugo-eureka)
theme: hugo-eureka
# Alternative: Hugo Module (replace in go.mod: github.com/ZhangYet/hugo-eureka)
# theme: wangchucheng.com/hugo-eureka

paginate: 5
enableEmoji: true
enableGitInfo: true
summaryLength: 75

defaultContentLanguage: zh
hasCJKLanguage: true # Set `true` for Chinese/Japanese/Korean.
defaultContentLanguageInSubdir: false

# Uncomment for google analytics
# googleAnalytics: UA-123-45

markup:
  # Do not modify markup.highlight
  highlight:
    codeFences: false
    noClasses: false
  tableOfContents:
    startLevel: 2
    endLevel: 6
    ordered: false
  goldmark:
    renderer:
      unsafe: true

taxonomies:
  category: categories
  tag: tags
  series: series
  author: authors

build:
  useResourceCacheWhen: always

outputFormats:
  RSS:
    mediatype: "application/rss+xml"
    baseName: "rss"
    isPlainText: false
    notAlternative: true
